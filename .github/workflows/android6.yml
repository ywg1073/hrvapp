name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip Source Code
        run: unzip -o hrv-monitor.zip

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 💥 最终绝杀：强行略过 debug 签名校验，直接打包出未签名的安装包（unsigned apk）
      - name: Build Unsigned APK
        run: gradle assembleDebug -Pandroid.packageBuildConfig=false -x test || gradle assembleRelease
