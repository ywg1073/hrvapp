name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip Source Code
        run: unzip -o hrv-monitor.zip

      # 💡 核心修正：自动寻找下一层目录中的 gradlew，并将其强行提到最外层根目录下
      - name: Move project files to root
        run: |
          SUBDIR=$(find . -maxdepth 2 -name "gradlew" -exec dirname {} \;)
          if [ ! -z "$SUBDIR" ] && [ "$SUBDIR" != "." ]; then
            echo "发现嵌套子文件夹: $SUBDIR，正在同步移至根目录..."
            cp -r $SUBDIR/* .
          fi

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug
