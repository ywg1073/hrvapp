name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip Source Code
        run: unzip -o hrv-monitor.zip

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 💥 终极物理作弊：既然你非要 debug.keystore，我就当场用 keytool 给你捏造一个标准的放进去！
      - name: Forge Debug Keystore
        run: |
          mkdir -p app
          keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      # 拿上伪造的通行证，带上无头环境保命符，正常敲门打包！
      - name: Build with system Gradle
        run: gradle assembleDebug --no-daemon -Djava.awt.headless=true
