name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip Source Code
        run: unzip -o hrv-monitor.zip

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. 依然保留伪造签名，防止它卡在下一步
      - name: Forge Debug Keystore
        run: |
          mkdir -p app
          keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      # 2. 💥 终极死命令：关闭守护进程、关闭并行、限制单核、声明无屏幕，老老实实单线走完！
      - name: Build with system Gradle
        run: |
          gradle assembleDebug \
            --no-daemon \
            --no-parallel \
            --max-workers=1 \
            -Djava.awt.headless=true
